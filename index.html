<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bibash Koirala portfolio timeline" />
  <title>Bibash Koirala | Timeline Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="decor decor-left"></div>
  <div class="decor decor-right"></div>

  <header class="hero-wrap" id="top">
    <nav class="top-nav">
      <a class="brand" id="brand-link" href="#top">Bibash Koirala</a>
      <button class="menu-toggle" aria-expanded="false" aria-controls="menu">Menu</button>
      <ul id="menu" class="menu"></ul>
      <a class="hire-btn" id="hire-btn" href="#contact">Hire Me</a>
    </nav>

    <section class="hero section-inner">
      <div class="hero-copy reveal">
        <h1 id="hero-title"></h1>
        <p id="hero-description"></p>
        <div class="hero-actions" id="hero-actions"></div>
      </div>

      <div class="hero-photo reveal">
        <div class="shape shape-red"></div>
        <div class="shape shape-green"></div>
        <div class="shape shape-line"></div>
        <img id="hero-image" src="assets/images/profile-pic.jpg" alt="Profile photo" />
      </div>
    </section>
  </header>

  <section class="about-block" id="about">
    <div class="section-inner about-grid">
      <div class="about-photo reveal">
        <div class="shape shape-red small"></div>
        <img id="about-image" src="assets/images/about-pic.jpg" alt="About" />
      </div>
      <div class="about-copy reveal">
        <h2 id="about-title"></h2>
        <p id="about-paragraph-1"></p>
        <p id="about-paragraph-2"></p>
      </div>
    </div>
  </section>

  <section class="education-block" id="education">
    <div class="section-inner">
      <div class="section-head reveal">
        <h2 id="education-title"></h2>
        <p id="education-subtitle"></p>
      </div>

      <div class="edu-chat reveal" id="edu-chat">
        <span class="chat-year" id="chat-year"></span>
        <p id="chat-text"></p>
      </div>

      <div class="edu-scroller" id="edu-scroller" aria-label="Education timeline"></div>
    </div>
  </section>

  <section class="experience-block" id="experience">
    <div class="section-inner">
      <div class="section-head reveal">
        <h2 id="experience-title"></h2>
        <p id="experience-subtitle"></p>
      </div>

      <div class="xp-timeline" id="xp-timeline">
        <div class="xp-line" id="xp-line">
          <div class="xp-progress" id="xp-progress"></div>
        </div>
        <div id="xp-items"></div>
      </div>
    </div>
  </section>

  <section class="projects-block" id="projects">
    <div class="section-inner">
      <div class="projects-head reveal">
        <div>
          <h2 id="projects-title"></h2>
          <p id="projects-subtitle"></p>
        </div>
      </div>

      <div class="project-showcase" id="project-showcase" aria-live="polite">
        <div class="project-column project-column-left" id="project-side-left"></div>
        <div class="project-column project-column-center" id="project-center">
          <article class="project-feature reveal" id="project-feature"></article>
        </div>
        <div class="project-column project-column-right" id="project-side-right"></div>
      </div>
    </div>
  </section>

  <section class="ticker-block" aria-label="Technology and work keywords">
    <div class="ticker">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </section>

  <section class="contact-block" id="contact">
    <div class="section-inner">
      <div class="section-head reveal">
        <h2 id="contact-title"></h2>
        <p id="contact-subtitle"></p>
      </div>
      <div class="contact-grid">
        <div class="contact-info reveal" id="contact-info"></div>
        <form class="contact-form reveal" id="contact-form">
          <h3 id="contact-form-title"></h3>
          <div class="input-row" id="contact-row-1"></div>
          <div class="input-row single" id="contact-row-2"></div>
          <button type="button" id="contact-button">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="section-inner footer-top" id="footer-top"></div>
    <div class="section-inner footer-bottom">
      <p id="footer-copyright"></p>
      <div class="footer-links" id="footer-links"></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
